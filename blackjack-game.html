<!DOCTYPE html>
<html lang="en">
<head>
    <base href="https://cdn.jsdelivr.net/gh/Synic-dx/blackJack@main/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackJack Game Online</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <header>
        <h1 id="title"><span id="play">play</span><a href="blackJack.html"><span id="name">black</span><span id="plate">Jack</span></a></h1>
        <p id="bank">$<span id="balance">5000</span></p>
    </header>
    <main>
        <section id="left">
            <h2 id="textleft">Welcome to BlackJack</h2>
            <h3 id="yourcard"> <span id="you">You:</span> <span id="typeU"> Type </span> of <span id="suitU"> Suit </span> and at: <span id="valueU"> Value </span></h3>
            <h3 id="dealercard"> <span id="dealer">Dealer:</span> <span id="typeD"> Type </span> of <span id="suitD"> Suit </span> and at: <span id="valueD"> Value </span></h3>
        </section>
        <section id="right">
            <h2 id="textright">Choose Bet</h2>
            <div id="buttons">
            <button id="button1" type="button">$100</button>
            <button id="button2" type="button">$500</button>
            <button id="button3" type="button">$1000</button>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
