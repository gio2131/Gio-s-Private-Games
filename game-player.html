<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Game Player</title>
    <style>
        html,body { height:100%; margin:0; font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif; background: #000; color: #fff; overflow: hidden; }
        .toolbar { display:flex; gap:.5rem; padding:.5rem; background:#111; color:#fff; align-items:center; height: 48px; box-sizing: border-box; }
        button { background:#0b84ff; color:#fff; border:0; padding:.5rem .8rem; border-radius:4px; cursor:pointer; font-size: 14px; }
        button:active { transform:translateY(1px); }
        .frame-wrapper { height: calc(100% - 48px); background:#000; display:flex; width: 100%; }
        iframe { border:0; width:100%; height:100%; display:block; }
    </style>
</head>
<body>
    <div class="toolbar">
        <span id="gameTitle">Game</span>
        <button id="homeBtn">Home</button>
        <div style="flex:1"></div>
        <button id="fsBtn">Enter fullscreen</button>
    </div>

    <div class="frame-wrapper" id="frameWrapper">
        <iframe id="gameFrame" src="" allowfullscreen allow="fullscreen"></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const gameUrl = params.get('url');
        const gameTitle = params.get('title');

        if (gameUrl) {
            document.getElementById('gameFrame').src = gameUrl;
        }
        if (gameTitle) {
            document.getElementById('gameTitle').textContent = gameTitle;
            document.title = gameTitle;
        }

        const fsBtn = document.getElementById('fsBtn');
        const wrapper = document.getElementById('frameWrapper');
        const homeBtn = document.getElementById('homeBtn');

        function isFullscreen() {
            return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
        }

        function requestFull(element) {
            if (element.requestFullscreen) return element.requestFullscreen();
            if (element.webkitRequestFullscreen) return element.webkitRequestFullscreen();
            if (element.mozRequestFullScreen) return element.mozRequestFullScreen();
            if (element.msRequestFullscreen) return element.msRequestFullscreen();
        }

        function exitFull() {
            if (document.exitFullscreen) return document.exitFullscreen();
            if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
            if (document.mozCancelFullScreen) return document.mozCancelFullScreen();
            if (document.msExitFullscreen) return document.msExitFullscreen();
        }

        fsBtn.addEventListener('click', async () => {
            try {
                if (!isFullscreen()) {
                    await requestFull(wrapper);
                } else {
                    await exitFull();
                }
            } catch (e) {
                console.error('Fullscreen request failed', e);
            }
        });

        homeBtn.addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        const updateFsBtn = () => {
            fsBtn.textContent = isFullscreen() ? 'Exit fullscreen' : 'Enter fullscreen';
        };

        document.addEventListener('fullscreenchange', updateFsBtn);
        document.addEventListener('webkitfullscreenchange', updateFsBtn);
        document.addEventListener('mozfullscreenchange', updateFsBtn);
        document.addEventListener('MSFullscreenChange', updateFsBtn);
    </script>
</body>
</html>
